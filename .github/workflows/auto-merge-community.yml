name: Auto-merge community data

on:
  pull_request:
    types: [opened, synchronize]
    branches: [main]

permissions:
  contents: write
  pull-requests: write

jobs:
  verify-and-merge:
    if: startsWith(github.head_ref, 'community/data/')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout PR
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Verify only per-user community files changed
        run: |
          # Get the PR author's GitHub login
          AUTHOR="${{ github.event.pull_request.user.login }}"
          echo "PR author: $AUTHOR"

          # Get list of changed files
          BASE="${{ github.event.pull_request.base.sha }}"
          HEAD="${{ github.event.pull_request.head.sha }}"
          CHANGED=$(git diff --name-only "$BASE" "$HEAD")
          echo "Changed files:"
          echo "$CHANGED"

          # Verify every changed file is in the author's community directory
          # or is .gitattributes (merge strategy config)
          VIOLATION=""
          while IFS= read -r file; do
            [ -z "$file" ] && continue

            # Allow .gitattributes
            if [ "$file" = ".gitattributes" ]; then
              continue
            fi

            # Allow community/{category}/{author}.jsonl or .json
            if echo "$file" | grep -qE "^community/[^/]+/${AUTHOR}\.(jsonl|json)$"; then
              continue
            fi

            # Allow personal translation XMLs under the author's translation tree
            if echo "$file" | grep -qE "^community/translations/${AUTHOR}/.+\.xml$"; then
              continue
            fi

            # Allow shared community files that use merge=union
            # (translation-memory.approved.jsonl, termbase.json, scholar-collections.json)
            if echo "$file" | grep -qE "^(translation-memory\.approved\.jsonl|termbase\.json|scholar-collections\.json|translation-review\.jsonl)$"; then
              continue
            fi

            # Anything else is a violation
            VIOLATION="$VIOLATION\n  $file"
          done <<< "$CHANGED"

          if [ -n "$VIOLATION" ]; then
            echo "::error::PR modifies files outside allowed community paths:$VIOLATION"
            exit 1
          fi

          echo "All changed files are within allowed community paths."

      - name: Auto-merge PR
        run: gh pr merge ${{ github.event.pull_request.number }} --merge --auto
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
